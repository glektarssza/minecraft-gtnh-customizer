        devOnlyNonPublishable(rfg.deobf("com.github.GTNewHorizons:TinkersConstruct:1.14.31-GTNH-pre"))
        devOnlyNonPublishable(rfg.deobf("com.github.GTNewHorizons:EnderZoo:1.3.3"))
        devOnlyNonPublishable(rfg.deobf("thaumcraft:Thaumcraft:1.7.10-4.2.3.5"))
        // -- Required by Thaumcraft
        runtimeOnlyNonPublishable("com.github.GTNewHorizons:Baubles-Expanded:2.2.8-GTNH")
    } else {
        // -- Support for other mods
        compileOnly(rfg.deobf("curse.maven:xaeros-minimap-263420:6012805"))
        compileOnly(rfg.deobf("curse.maven:xaeros-world-map-317780:5987124"))
        compileOnly(rfg.deobf("com.github.GTNewHorizons:Backhand:1.8.3"))
        compileOnly(rfg.deobf("com.github.GTNewHorizons:SpecialMobs:3.7.2"))
        compileOnly(rfg.deobf("com.github.GTNewHorizons:ServerUtilities:2.2.16"));
        compileOnly(rfg.deobf("com.github.GTNewHorizons:TinkersConstruct:1.14.31-GTNH-pre"))
        compileOnly(rfg.deobf("com.github.GTNewHorizons:EnderZoo:1.3.3"))
        compileOnly(rfg.deobf("thaumcraft:Thaumcraft:1.7.10-4.2.3.5"))
        // -- Required by Thaumcraft
        runtimeOnlyNonPublishable("com.github.GTNewHorizons:Baubles-Expanded:2.2.8-GTNH")
