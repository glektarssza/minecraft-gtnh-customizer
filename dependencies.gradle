/**
 * Check if a project property is enabled.
 */
def isPropEnabled(String id) {
    return project.hasProperty(id) && project.getProperty(id).toBoolean()
}

dependencies {
    compileOnly("com.google.code.gson:gson:2.2.+")

    if (isPropEnabled("enableDependenciesForLocalTesting")) {
        // -- Support for other mods and local testing
        devOnlyNonPublishable(rfg.deobf("curse.maven:xaeros-minimap-263420:6012805"))
        devOnlyNonPublishable(rfg.deobf("curse.maven:xaeros-world-map-317780:5987124"))
        devOnlyNonPublishable(rfg.deobf("com.github.GTNewHorizons:Backhand:1.8.3"))
        devOnlyNonPublishable(rfg.deobf("com.github.GTNewHorizons:SpecialMobs:3.7.2"))
